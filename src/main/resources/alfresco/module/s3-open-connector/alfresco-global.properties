## S3/MinIO Content Store Configuration
## Define default values for all properties here.
## System Administrators can override these values in environment specific configurations in
## alfresco/tomcat/shared/classes/alfresco-global.properties.

# MinIO / S3 credentials
s3.accessKey=
s3.secretKey=

# The S3 region (us-east-1 will be used by default if not specified)
s3.regionName=us-east-1

# The S3 bucket name to use as the content store
s3.bucketName=

# The endpoint URL if other than AWS (for MinIO or other S3-compatible vendors)
s3.endpoint=

# The relative path (S3 KEY) within the bucket to use as the content store
s3.rootDirectory=/alfresco/contentstore

# Enable path-style access (required for MinIO, set to false for AWS S3)
s3.pathStyleAccess=true

# S3 Client settings
s3.client.connectionTimeout=50000
s3.client.connectionTTL=60000
s3.client.maxErrorRetry=5

# Caching Content Store settings
s3.content.caching.cacheOnInbound=true
s3.content.caching.minFileAgeMillis=60000
s3.content.caching.maxDeleteWatchCount=1
s3.content.caching.contentCleanup.cronExpression=0 0 3 * * ?

# Cache quota
s3.quota.maxUsageMB=4096
s3.quota.maxFileSizeMB=0

# Cache directory
s3.content.cache.cachedcontent=/tmp/cachedcontent

# Eager orphan cleanup - delete content from MinIO when nodes are deleted
system.content.eagerOrphanCleanup=true
system.content.orphanProtectDays=1
