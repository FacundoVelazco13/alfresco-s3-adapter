alfresco.context=alfresco
alfresco.host=localhost
alfresco.port=8080
alfresco.protocol=http

share.context=share
share.host=localhost
share.port=8180
share.protocol=http

index.recovery.mode=NONE

wcmqs.dynamicCollectionProcessor.schedule=0 30 2 * * ? 2060
wcmqs.feedbackProcessor.schedule=0 40 2 * * ? 2060
wcmqs.publishQueueProcessor.schedule=0 50 2 * * ? 2060

integrity.failOnError=true

db.driver=org.postgresql.Driver

index.subsystem.name=solr6
solr.host=s3-open-connector-ass
solr.port=8983
solr.secureComms=secret
solr.sharedSecret=secret

db.username=alfresco
db.password=alfresco
db.pool.initial=10
db.pool.max=100

db.url=jdbc:postgresql://s3-open-connector-postgres:5432/alfresco

cifs.enabled=false
ftp.enabled=false

csrf.filter.enabled=false

messaging.broker.url=vm://localhost?broker.persistent=false

transform.service.enabled=false
local.transform.service.enabled=false
legacy.transform.service.enabled=false

# S3 configuration for Docker environment (MinIO)
s3.accessKey=minioadmin
s3.secretKey=minioadmin
s3.regionName=us-east-1
s3.bucketName=alfresco
s3.endpoint=http://s3-open-connector-minio:9000
s3.rootDirectory=/alfresco/contentstore
s3.pathStyleAccess=true

s3.client.connectionTimeout=50000
s3.client.connectionTTL=60000
s3.client.maxErrorRetry=5

s3.content.caching.cacheOnInbound=true
s3.content.caching.minFileAgeMillis=60000
s3.content.caching.maxDeleteWatchCount=1
s3.content.caching.contentCleanup.cronExpression=0 0 3 * * ?

s3.quota.maxUsageMB=4096
s3.quota.maxFileSizeMB=0

s3.content.cache.cachedcontent=/tmp/cachedcontent

# Eager orphan cleanup
system.content.eagerOrphanCleanup=true
system.content.orphanProtectDays=1
